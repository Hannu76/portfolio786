<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Naveed Mahommad</title>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600;700;800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  <style>
    .utility-page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 10;
    }
    .error-code {
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 900;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #e0e0e0 0%, #888888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 1rem;
      text-shadow: 0px 10px 30px rgba(0,0,0,0.5);
    }
    .error-title {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: #ffffff;
      margin-bottom: 1.5rem;
      font-family: 'Montserrat', sans-serif;
    }
    .error-desc {
      color: #9ca3af;
      font-size: 1.1rem;
      max-width: 500px;
      margin-bottom: 3rem;
      line-height: 1.6;
    }
    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      padding: 1rem 2rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #ffffff;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    .home-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body style="background-color: #0f1012; overflow-x: hidden;">

  <!-- Floating Liquid Glass Background Blobs -->
  <div class="liquid-bg-wrapper">
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>
    <div class="liquid-blob blob-3"></div>
  </div>

  <main class="utility-page-wrapper">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">Oops! The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    
    <a href="index.html" class="home-btn">
      <i class="fa-solid fa-arrow-left"></i> Return to Homepage
    </a>
  </main>

</body>
</html>
