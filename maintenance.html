<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance | Naveed Mahommad</title>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600;700;800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  <style>
    .utility-page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 10;
    }
    .maintenance-icon {
      font-size: 5rem;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 2rem;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
    }
    .error-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: #ffffff;
      margin-bottom: 1.5rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .highlight-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1.5rem 2.5rem;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      margin-bottom: 2rem;
      max-width: 600px;
    }
    .highlight-text {
      color: #e0e0e0;
      font-size: 1.25rem;
      line-height: 1.6;
      font-weight: 500;
    }
    .highlight-text strong {
      color: #ffffff;
      background: linear-gradient(90deg, #ffffff 0%, #a0a0a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }
    .contact-icons-row {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-top: 2rem;
    }
    .contact-icons-row .contact-icon-btn {
      transition: transform 0.3s ease;
      background: transparent !important; /* Remove grey background */
      border: none !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      width: 72px;
      height: 72px;
      padding: 0;
    }
    .contact-icons-row .contact-icon-btn img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      border-radius: 18px; /* Perfectly round the white edges to match the card */
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform: none !important; /* Reset global LinkedIn scale */
    }
    .contact-icons-row .contact-icon-btn img[src*="linkedin"] {
      transform: none !important; /* Force reset global style.css scale(1.42) */
    }
    .contact-icons-row .contact-icon-btn:hover {
      transform: translateY(-5px) scale(1.05);
      background: transparent !important;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3) !important;
      border: none !important;
    }
    .contact-icons-row .contact-icon-btn:hover img {
      transform: scale(1.05);
    }
    
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>
<body style="background-color: #0f1012; overflow-x: hidden;">

  <!-- Floating Liquid Glass Background Blobs -->
  <div class="liquid-bg-wrapper">
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>
    <div class="liquid-blob blob-3"></div>
  </div>

  <main class="utility-page-wrapper">
    <i class="fa-solid fa-screwdriver-wrench maintenance-icon"></i>
    
    <h1 class="error-title">We'll be back soon!</h1>
    
    <div class="highlight-box">
      <p class="highlight-text">
        <strong>We are currently working on an update on the website.</strong><br><br>
        We're making things better behind the scenes. Please make sure to log in or check back sometime soon!
      </p>
    </div>

    <p style="color: #9ca3af; margin-bottom: 1rem;">In the meantime, you can reach me here:</p>
    
    <div class="contact-icons-row">
      <a href="mailto:Naveedmd78600@Gmail.com" class="contact-icon-btn" title="Email Me" aria-label="Email Me">
        <img src="images/3d_gmail_icon_new.png" alt="Gmail" width="48" height="48">
      </a>
      <a href="tel:9182502259" class="contact-icon-btn" title="Call Me" aria-label="Call Me">
        <img src="images/3d_phone_transparent.png" alt="Phone" width="48" height="48">
      </a>
      <a href="https://www.linkedin.com/in/naveed-mahommad-75b796276/" target="_blank" rel="noopener noreferrer"
        class="contact-icon-btn" title="LinkedIn Profile" aria-label="LinkedIn Profile">
        <img src="images/3d_linkedin_transparent.png" alt="LinkedIn" width="48" height="48">
      </a>
    </div>
  </main>

</body>
</html>
